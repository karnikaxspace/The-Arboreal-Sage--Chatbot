<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Arboreal Sage</title>
  <style>
    /* ===== New Color Theme ===== */
    :root {
      --color-bg-primary: #C1A0AC;   /* FUINKEY */
      --color-bg-secondary: #F0D9E4; /* HEATHER*/
      --color-accent: #CF4A4D;       /* Valiant Poppy */
      --color-text-primary: #4A3F4B; /* Usuğaki */
      --color-text-secondary: #817965; /* Bried Herbs */
      --color-warning: #CF4A4D;      /* Valiant Poppy (also used for errors) */

      --radius: 14px;
      --font-display: 'Georgia', 'Iowan Old Style', serif;
      --font-body: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--color-bg-primary);
      font-family: var(--font-body);
      color: var(--color-text-primary);
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ---------- Header ---------- */
    header {
      background: var(--color-bg-secondary);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 166, 122, 0.15);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .sage-emblem {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }
    header h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 0;
      letter-spacing: 0.3px;
      color: var(--color-text-primary);
    }
    header p {
      margin: 2px 0 0;
      font-size: 0.78rem;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* ---------- Layout ---------- */
    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      min-height: 0;
    }
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bubble-row { display: flex; width: 100%; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.sage { justify-content: flex-start; }
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 0.96rem;
      white-space: pre-wrap;
    }
    .bubble.sage {
      background: rgba(255, 166, 122, 0.08);
      border: 1px solid rgba(255, 166, 122, 0.18);
      color: var(--color-text-primary);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border-bottom-right-radius: 4px;
    }
    .bubble.error {
      background: var(--color-warning);
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    .timestamp {
      font-size: 0.68rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
      padding: 0 4px;
    }
    .bubble-row.user .timestamp { text-align: right; }
    .typing {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      font-style: italic;
      padding-left: 4px;
    }

    /* ---------- Quick actions ---------- */
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 16px;
      border-top: 1px solid rgba(255, 166, 122, 0.1);
    }
    .quick-btn {
      background: transparent;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      font-family: var(--font-body);
    }
    .quick-btn:hover,
    .quick-btn:focus-visible {
      background: var(--color-accent);
      color: #fff;
      outline: none;
    }

    /* ---------- Input bar ---------- */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px 18px;
      background: var(--color-bg-primary);
      border-top: 1px solid rgba(255, 166, 122, 0.12);
    }
    .input-bar input {
      flex: 1;
      background: var(--color-bg-secondary);
      border: 1px solid rgba(255, 166, 122, 0.2);
      color: var(--color-text-primary);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font-body);
    }
    .input-bar input::placeholder { color: var(--color-text-secondary); }
    .input-bar input:focus-visible,
    .quick-btn:focus-visible,
    .send-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    .send-btn {
      background: var(--color-accent);
      color: #fff;
      border: none;
      padding: 0 20px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: var(--font-body);
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .send-btn:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    /* ---------- Setup overlay ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--color-bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .overlay-card {
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .overlay-card .sage-emblem {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
    }
    .overlay-card h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin: 0 0 8px;
      color: var(--color-text-primary);
    }
    .overlay-card p {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .overlay-card input {
      width: 100%;
      background: rgba(255, 166, 122, 0.08);
      border: 1px solid rgba(255, 166, 122, 0.25);
      color: var(--color-text-primary);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      margin-bottom: 14px;
      font-family: var(--font-body);
      text-align: center;
    }
    .overlay-card button {
      width: 100%;
      background: var(--color-accent);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .bubble { max-width: 88%; }
      header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- Setup Overlay -->
<div class="overlay" id="setupOverlay">
  <div class="overlay-card">
    <svg class="sage-emblem" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="23" fill="#4E4C5E" stroke="#FFA67A" stroke-width="1.5"/>
      <path d="M24 36V20" stroke="#FFA67A" stroke-width="2" stroke-linecap="round"/>
      <path d="M24 22C24 22 16 22 16 14C16 14 24 14 24 22Z" fill="#CF4A4D"/>
      <path d="M24 26C24 26 32 26 32 18C32 18 24 18 24 26Z" fill="#DC7668"/>
      <circle cx="24" cy="38" r="3" fill="#817965"/>
    </svg>
    <h2>Welcome, traveler.</h2>
    <p>I am the Arboreal Sage. Before we walk together, what name shall I call you by?</p>
    <input type="text" id="nameInput" placeholder="Your name" autofocus />
    <button id="nameSubmit">Begin</button>
  </div>
</div>

<!-- Main UI -->
<header>
  <svg class="sage-emblem" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="23" fill="#4E4C5E" stroke="#FFA67A" stroke-width="1.5"/>
    <path d="M24 36V20" stroke="#FFA67A" stroke-width="2" stroke-linecap="round"/>
    <path d="M24 22C24 22 16 22 16 14C16 14 24 14 24 22Z" fill="#CF4A4D"/>
    <path d="M24 26C24 26 32 26 32 18C32 18 24 18 24 26Z" fill="#DC7668"/>
    <circle cx="24" cy="38" r="3" fill="#817965"/>
  </svg>
  <div>
    <h1>The Arboreal Sage</h1>
    <p>a quiet guide for the things you're growing</p>
  </div>
</header>

<div class="app">
  <div class="chat-window" id="chatWindow"></div>

  <div class="quick-actions">
    <button class="quick-btn" data-action="daily-dig">🌱 The Daily Dig</button>
    <button class="quick-btn" data-action="reflection">🍂 The Reflection</button>
    <button class="quick-btn" data-action="check-in">🌳 Check on my root</button>
  </div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="Speak your mind…" />
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<script>
  // DOM refs
  const chatWindow = document.getElementById('chatWindow');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const setupOverlay = document.getElementById('setupOverlay');
  const nameInput = document.getElementById('nameInput');
  const nameSubmit = document.getElementById('nameSubmit');

  // Point to the Flask backend (adjust if needed)
  const API_BASE = 'http://localhost:5000/api'; // or '/api' if served from Flask

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addBubble(text, who = 'sage', isError = false) {
    const row = document.createElement('div');
    row.className = `bubble-row ${who}`;
    const wrap = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = `bubble ${isError ? 'error' : who}`;
    bubble.textContent = text;
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = timeNow();
    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(wrap);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row sage';
    row.id = 'typingRow';
    row.innerHTML = `<div class="typing">The Sage is listening to the wind…</div>`;
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  async function sendMessageToBackend(text) {
    try {
      const response = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ message: text })
      });
      if (!response.ok) {
        const err = await response.text();
        throw new Error(`Server error ${response.status}: ${err}`);
      }
      const data = await response.json();
      return data.reply;
    } catch (error) {
      console.error('API call failed:', error);
      return null;
    }
  }

  async function handleUserMessage(rawText) {
    const text = rawText.trim();
    if (!text) return;

    addBubble(text, 'user');
    userInput.value = '';
    sendBtn.disabled = true;

    addTyping();
    const reply = await sendMessageToBackend(text);
    removeTyping();

    if (reply) {
      addBubble(reply, 'sage');
    } else {
      addBubble("The wind carried your words away — let us try again in a moment.", 'sage', true);
    }
    sendBtn.disabled = false;
  }

  async function beginSession() {
    const name = nameInput.value.trim() || 'friend';
    setupOverlay.style.display = 'none';

    addTyping();
    const reply = await sendMessageToBackend(`My name is ${name}`);
    removeTyping();
    if (reply) {
      addBubble(reply, 'sage');
    } else {
      addBubble(`Welcome, ${name}. I am the Arboreal Sage.`, 'sage');
    }
  }

  nameSubmit.addEventListener('click', beginSession);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') beginSession(); });

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      let msg = '';
      if (action === 'daily-dig') msg = 'Start the Daily Dig';
      else if (action === 'reflection') msg = 'Start a Reflection';
      else if (action === 'check-in') msg = 'How did my objective take root?';
      if (msg) handleUserMessage(msg);
    });
  });

  sendBtn.addEventListener('click', () => handleUserMessage(userInput.value));
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleUserMessage(userInput.value);
  });
</script>
</body>
</html>
